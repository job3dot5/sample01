security:
    password_hashers:
        App\Security\DashboardUser:
            algorithm: bcrypt

    providers:
        dashboard_provider:
            id: App\Security\DashboardUserProvider

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: dashboard_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_dashboard_index
                enable_csrf: true
                csrf_token_id: authenticate
            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/logout, roles: PUBLIC_ACCESS }
        - { path: ^/(dashboard|routes|health), roles: ROLE_DASHBOARD }
